<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drive Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #161616;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: #fff; }

    .drive-pill {
      font-size: 0.7rem;
      background: #1e3a5f;
      color: #7ab3ef;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 500;
    }

    #clear-btn {
      margin-left: auto;
      background: none;
      border: 1px solid #333;
      color: #888;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    #clear-btn:hover { border-color: #555; color: #ccc; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message {
      max-width: 760px;
      width: 100%;
      display: flex;
      gap: 12px;
      align-self: flex-start;
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .message.user .avatar  { background: #2563eb; color: #fff; }
    .message.assistant .avatar { background: #1a1a1a; border: 1px solid #333; color: #888; }

    .bubble {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 12px 16px;
      line-height: 1.6;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble {
      background: #1d3a6b;
      border-color: #2a4a8a;
    }

    .tool-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a2a1a;
      border: 1px solid #2a3d2a;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.78rem;
      color: #6abf6a;
      margin: 4px 0;
    }
    .tool-badge .icon { font-size: 1rem; }
    .tool-badge.result { background: #1a2a1a; border-color: #2a3d2a; color: #5a9f5a; }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #2a2a2a;
      background: #161616;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e8e8e8;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
      outline: none;
    }
    #message-input:focus { border-color: #3a6abf; }
    #message-input::placeholder { color: #555; }

    #send-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) { background: #1d4ed8; }
    #send-btn:disabled { background: #333; color: #666; cursor: default; }

    .typing-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #888;
      animation: blink 1.2s infinite;
      margin: 0 2px;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>Drive Chat</h1>
  <span class="drive-pill">Google Drive</span>
  <button id="clear-btn" onclick="clearChat()">Clear</button>
</header>

<div id="messages">
  <div class="message assistant">
    <div class="avatar">C</div>
    <div class="bubble">Hi! I'm Claude, and I have access to your Google Drive. Ask me to find files, summarize documents, or answer questions about your content.</div>
  </div>
</div>

<div id="input-area">
  <textarea
    id="message-input"
    placeholder="Ask about your Drive files…"
    rows="1"
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"
  ></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  const SESSION_ID = crypto.randomUUID();
  let isStreaming = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  async function clearChat() {
    await fetch('/chat/clear', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID }),
    });
    const msgs = document.getElementById('messages');
    msgs.innerHTML = `
      <div class="message assistant">
        <div class="avatar">C</div>
        <div class="bubble">Chat cleared. How can I help you?</div>
      </div>`;
  }

  function appendMessage(role, html, id) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (id) div.id = id;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? 'Y' : 'C'}</div>
      <div class="bubble">${html}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function escape(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    if (isStreaming) return;
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;
    isStreaming = true;

    appendMessage('user', escape(text));

    const replyId = 'reply-' + Date.now();
    const replyDiv = appendMessage('assistant', '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>', replyId);
    const bubble = replyDiv.querySelector('.bubble');

    let replyText = '';

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: SESSION_ID }),
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        const lines = buf.split('\n\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const event = JSON.parse(line.slice(6));

          if (event.type === 'text') {
            replyText += event.text;
            bubble.textContent = replyText;
            replyDiv.scrollIntoView({ block: 'nearest' });
          } else if (event.type === 'tool_call') {
            const badge = document.createElement('div');
            badge.className = 'tool-badge';
            badge.innerHTML = `<span class="icon">📂</span> Calling <strong>${escape(event.tool)}</strong>…`;
            bubble.textContent = replyText;
            bubble.appendChild(document.createElement('br'));
            bubble.appendChild(badge);
          } else if (event.type === 'tool_result') {
            const badge = document.createElement('div');
            badge.className = 'tool-badge result';
            badge.innerHTML = `<span class="icon">✓</span> <strong>${escape(event.tool)}</strong>: ${escape(event.preview)}…`;
            bubble.appendChild(badge);
          } else if (event.type === 'done') {
            if (!replyText) bubble.textContent = '(no response)';
          }
        }
      }
    } catch (err) {
      bubble.textContent = 'Error: ' + err.message;
    } finally {
      isStreaming = false;
      document.getElementById('send-btn').disabled = false;
    }
  }
</script>
</body>
</html>
